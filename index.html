<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF AI 번역기</title>
  
  <!-- 1. Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. PDF.js (브라우저에서 직접 PDF 추출용) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // PDF 엔진 초기화
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <!-- 3. Babel (브라우저에서 React JSX 문법을 즉시 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <div id="root"></div>

  <!-- React 애플리케이션 코드 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useCallback, useRef } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { Upload, FileText, Languages, Download, CheckCircle, AlertCircle, Loader2, File, ChevronRight, RefreshCw, Key, LogOut } from 'https://esm.sh/lucide-react@0.294.0';

    // --- 헬퍼 함수: AI가 알려준 좌표를 바탕으로 원본 이미지에서 그림만 잘라내기 ---
    const cropImageFromBase64 = (base64Str, y1, x1, y2, x2) => {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const w = img.width;
          const h = img.height;
          
          const sy = Math.max(0, (y1 / 1000) * h);
          const sx = Math.max(0, (x1 / 1000) * w);
          const ey = Math.min(h, (y2 / 1000) * h);
          const ex = Math.min(w, (x2 / 1000) * w);
          const sw = ex - sx;
          const sh = ey - sy;

          if (sw <= 0 || sh <= 0) {
            resolve(null);
            return;
          }
          
          canvas.width = sw;
          canvas.height = sh;
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
          resolve(canvas.toDataURL('image/jpeg', 0.9));
        };
        img.onerror = () => resolve(null);
        img.src = base64Str;
      });
    };

    function App() {
      // API Key & Model 상태 관리
      const [userApiKey, setUserApiKey] = useState('');
      const [tempApiKey, setTempApiKey] = useState('');
      // 기본 모델을 가장 안정적인 1.5-flash로 설정 (외부 배포용)
      const [selectedModel, setSelectedModel] = useState('gemini-1.5-flash');
      const [tempModel, setTempModel] = useState('gemini-1.5-flash');
      const [isApiKeySet, setIsApiKeySet] = useState(false);

      // PDF 번역 관련 상태
      const [file, setFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [progressStatus, setProgressStatus] = useState('');
      const [results, setResults] = useState([]);
      const [error, setError] = useState('');
      const [domain, setDomain] = useState('일반');
      const fileInputRef = useRef(null);

      const domains = ['일반', 'IT/소프트웨어', '의학/보건', '법률/행정', '경제/경영', '기계/공학', '자연과학', '인문/예술', '교육학'];

      const handleApiKeySubmit = (e) => {
        if (e) e.preventDefault();
        const key = tempApiKey.trim();
        setUserApiKey(key); 
        
        // API 키가 비어있다면 Canvas 내부 테스트용으로 간주
        if (!key) {
          setSelectedModel('gemini-2.5-flash-preview-09-2025');
        } else {
          setSelectedModel(tempModel);
        }
        
        setIsApiKeySet(true);
        setError(''); 
      };

      const handleApiKeyReset = () => {
        if (window.confirm("API 키를 초기화하시겠습니까?")) {
          setUserApiKey('');
          setTempApiKey('');
          setIsApiKeySet(false);
        }
      };

      const translatePageImage = async (base64Image, currentDomain, previousContext = "", retries = 5) => {
        if (!base64Image) return '';
        
        const delays = [1000, 2000, 4000, 8000, 16000];
        const base64Data = base64Image.split(',')[1];
        
        const contextPrompt = previousContext 
          ? `\n\n[이전 페이지 문맥 참고]\n이전 페이지의 마지막 번역 내용은 다음과 같습니다:\n"... ${previousContext}"\n\n*중요: 이전 페이지에서 문장이 마침표로 끝나지 않고 끊어졌다면, 현재 페이지의 첫 부분과 자연스럽게 연결하여 하나의 완성된 문장으로 번역하세요. 완성된 번역 결과는 현재 페이지 번역의 맨 처음에 위치하게 하세요.*`
          : "";

        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ 
                  parts: [
                    { text: `다음 문서 이미지를 한국어로 번역해주세요. \n\n[전문 분야: ${currentDomain}]${contextPrompt}\n\n지시사항:\n1. 지정된 전문 분야에서 가장 널리 사용되는 자연스러운 용어를 사용하세요.\n2. 문서에 표(Table)가 있다면, 마크다운 표 형식(| 항목 | 내용 |)을 사용하여 구조를 최대한 원본과 동일하게 재현하세요.\n3. 문서에 그림, 그래프, 로고, 사진 등이 있다면 반드시 해당 그림이 있는 원본 이미지 상의 영역 좌표(0~1000 비율)를 찾아 정확히 \`[IMAGE|ymin|xmin|ymax|xmax|간략설명]\` 형태의 태그 하나로 표시하세요. (예시: \`[IMAGE|150|200|450|800|2023년 분기별 매출 그래프]\`).\n- ymin, xmin은 그림의 좌측 상단, ymax, xmax는 우측 하단 좌표입니다.\n- 태그 안에는 띄어쓰기를 넣지 마세요.\n- 그림 내부에 있는 텍스트나 캡션은 해당 태그 바로 아랫줄에 이어서 번역하세요.\n4. 전체적인 문단 배치나 줄바꿈 등의 포맷팅을 원본 문서와 최대한 유사하게 유지하세요.\n5. 페이지 구분으로 인해 잘린 문장은 현재 페이지 번역 시작 부분에서 매끄럽게 완성해주세요.` },
                    { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                  ] 
                }],
                systemInstruction: { 
                  parts: [{ text: "You are a professional translator specializing in English to Korean translation. You accurately extract and translate text from document images while maintaining structural formatting like tables, and accurately bounding boxes for images." }] 
                }
              })
            });

            if (!response.ok) {
              const errText = await response.text();
              let detailedError = `HTTP ${response.status}`;
              try {
                const errJson = JSON.parse(errText);
                if (errJson.error && errJson.error.message) {
                  detailedError += `: ${errJson.error.message}`;
                  if (detailedError.includes('404')) {
                    detailedError += "\n(안내: 선택한 모델이 현재 API 버전에서 지원되지 않거나 존재하지 않습니다. 다른 모델(예: gemini-1.5-flash)로 변경해 보세요.)";
                  }
                }
              } catch(e) { detailedError += ` - ${errText.substring(0, 100)}`; }
              throw new Error(detailedError);
            }
            
            const result = await response.json();
            let translatedText = result.candidates?.[0]?.content?.parts?.[0]?.text || "번역 결과를 가져오지 못했습니다.";

            const imageRegex = /\[IMAGE\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(.*?)\]/ig;
            const matches = [...translatedText.matchAll(imageRegex)];
            
            for (const m of matches) {
              const fullMatch = m[0];
              const y1 = parseInt(m[1], 10);
              const x1 = parseInt(m[2], 10);
              const y2 = parseInt(m[3], 10);
              const x2 = parseInt(m[4], 10);
              const desc = m[5].trim();
              
              try {
                const croppedBase64 = await cropImageFromBase64(base64Image, y1, x1, y2, x2);
                if (croppedBase64) {
                  translatedText = translatedText.replace(fullMatch, `\n\n![${desc}](${croppedBase64})\n\n`);
                } else {
                  translatedText = translatedText.replace(fullMatch, `\n\n[그림: ${desc}]\n\n`);
                }
              } catch (e) {
                translatedText = translatedText.replace(fullMatch, `\n\n[그림: ${desc}]\n\n`);
              }
            }

            return translatedText;
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(resolve => setTimeout(resolve, delays[i]));
          }
        }
      };

      const handleFileUpload = async (uploadedFile) => {
        if (!uploadedFile || uploadedFile.type !== 'application/pdf') {
          setError("PDF 파일만 업로드 가능합니다.");
          return;
        }

        setFile(uploadedFile);
        setError('');
        setIsProcessing(true);
        setResults([]);
        setProgressStatus('PDF 파일을 분석 중입니다...');

        try {
          const arrayBuffer = await uploadedFile.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument(arrayBuffer).promise;
          const numPages = pdf.numPages;
          
          const initialResults = Array.from({ length: numPages }, (_, i) => ({
            page: i + 1,
            originalImage: '',
            translated: '',
            status: 'pending'
          }));
          setResults(initialResults);

          let previousContext = "";

          for (let i = 1; i <= numPages; i++) {
            setResults(prev => prev.map(r => r.page === i ? { ...r, status: 'extracting' } : r));
            setProgressStatus(`페이지 ${i}/${numPages} 시각적 분석 중...`);
            
            const page = await pdf.getPage(i);
            
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);
            
            setResults(prev => prev.map(r => r.page === i ? { ...r, originalImage: base64Image, status: 'translating' } : r));
            setProgressStatus(`페이지 ${i}/${numPages} AI 전문 번역 및 이미지 삽입 중 (${domain})...`);

            try {
              const translatedText = await translatePageImage(base64Image, domain, previousContext);
              setResults(prev => prev.map(r => r.page === i ? { ...r, translated: translatedText, status: 'done' } : r));
              previousContext = translatedText.slice(-150).trim();
            } catch (err) {
              console.error(`Page ${i} Error:`, err);
              setResults(prev => prev.map(r => r.page === i ? { 
                ...r, 
                translated: `[번역 실패]\n오류가 발생했습니다.\n상세 원인: ${err.message}`, 
                status: 'error' 
              } : r));
              previousContext = ""; 
            }
          }
          
          setProgressStatus('모든 처리가 완료되었습니다!');
        } catch (err) {
          console.error(err);
          setError("PDF 파일을 처리하는 중 오류가 발생했습니다. 암호가 걸려있거나 손상된 파일일 수 있습니다.");
        } finally {
          setIsProcessing(false);
        }
      };

      const onDragOver = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
      }, []);

      const onDrop = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFileUpload(e.dataTransfer.files[0]);
        }
      }, [userApiKey, selectedModel]); 

      const handleReset = () => {
        setFile(null);
        setResults([]);
        setError('');
        setProgressStatus('');
      };

      const downloadText = () => {
        if (results.length === 0) return;
        
        let textContent = `# ${file.name} 번역 결과\n\n`;
        textContent += `**전문 분야:** ${domain}\n\n**모델:** ${selectedModel}\n\n---\n\n`;
        
        results.forEach(r => {
          textContent += `## 페이지 ${r.page}\n\n${r.translated}\n\n---\n\n`;
        });

        const blob = new Blob([textContent], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `번역됨_${file.name.replace('.pdf', '')}.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const formatTranslatedText = (text, status) => {
        if (!text) return <span className="italic text-slate-400 font-normal text-slate-800">번역 결과가 없습니다.</span>;
        
        const isError = status === 'error';
        const parts = text.split(/!\[(.*?)\]\((data:image\/[^)]+)\)/g);
        
        const elements = [];
        for (let i = 0; i < parts.length; i += 3) {
          if (parts[i]) {
            elements.push(<span key={`text-${i}`}>{parts[i]}</span>);
          }
          if (i + 1 < parts.length) {
            const alt = parts[i+1];
            const src = parts[i+2];
            elements.push(
              <div key={`img-${i}`} className="my-5 border border-slate-200 rounded-xl overflow-hidden bg-slate-100 p-2 shadow-sm flex flex-col items-center w-full max-w-full">
                <img src={src} alt={alt} className="max-w-full h-auto rounded-lg shadow-sm" />
                {alt && <p className="text-center text-xs text-slate-500 mt-2 font-medium bg-white px-3 py-1 rounded-full shadow-sm">{alt}</p>}
              </div>
            );
          }
        }
        
        return (
          <div className={`whitespace-pre-wrap font-sans leading-relaxed text-[15px] ${isError ? 'text-red-600 font-medium' : 'text-slate-800'}`}>
            {elements}
          </div>
        );
      };

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-6xl mx-auto space-y-6">
            
            {/* Header */}
            <div className="text-center space-y-2 mb-10">
              <div className="flex items-center justify-center space-x-3 mb-4">
                <div className="p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200">
                  <Languages className="w-8 h-8 text-white" />
                </div>
                <h1 className="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">PDF AI 번역기</h1>
              </div>
              <p className="text-slate-500 max-w-2xl mx-auto">
                영어 PDF 파일을 업로드하면 AI가 문맥을 파악하여 자연스러운 한국어로 번역해 줍니다.
              </p>
            </div>

            {/* Error Message */}
            {error && (
              <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl flex items-center shadow-sm">
                <AlertCircle className="w-5 h-5 mr-3 flex-shrink-0" />
                <p className="whitespace-pre-wrap">{error}</p>
              </div>
            )}

            {!file && (
              <div className="mt-8 space-y-6">
                
                {/* 1. API Key Input */}
                <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                  <div className="w-full">
                    <label className="block text-sm font-semibold text-slate-700 mb-2 flex items-center">
                      <Key className="w-4 h-4 mr-2 text-blue-500" />
                      1. API 키 및 모델 설정
                    </label>
                    <div className="text-xs text-slate-500 mb-4 p-3 bg-slate-50 rounded-xl space-y-1 border border-slate-100">
                      <p>👉 <strong className="text-blue-600">GitHub 등 외부 배포 시:</strong> 본인의 API 키를 입력하고 <code>1.5 Flash</code>를 선택하세요.</p>
                      <p>👉 <strong className="text-slate-500 italic text-[10px]">404 오류 발생 시:</strong> 모델 목록에서 다른 모델을 선택해 보세요.</p>
                    </div>
                    <form onSubmit={handleApiKeySubmit} className="flex flex-col md:flex-row gap-2">
                      <input
                        type="password"
                        placeholder="API 키를 입력하세요"
                        value={tempApiKey}
                        onChange={(e) => setTempApiKey(e.target.value)}
                        disabled={isApiKeySet}
                        className="flex-1 px-4 py-2.5 text-sm rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-400"
                      />
                      <select
                        value={tempModel}
                        onChange={(e) => setTempModel(e.target.value)}
                        disabled={isApiKeySet}
                        className="w-full md:w-56 px-3 py-2.5 text-sm rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-400"
                      >
                        <option value="gemini-1.5-flash">gemini-1.5-flash (표준)</option>
                        <option value="gemini-1.5-pro">gemini-1.5-pro (고품질)</option>
                        <option value="gemini-2.0-flash-exp">gemini-2.0-flash-exp (최신)</option>
                        <option value="gemini-2.5-flash-preview-09-2025">gemini-2.5-flash-preview (Canvas용)</option>
                      </select>
                      {!isApiKeySet ? (
                        <button
                          type="submit"
                          className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm whitespace-nowrap"
                        >
                          설정 저장
                        </button>
                      ) : (
                        <button
                          type="button"
                          onClick={handleApiKeyReset}
                          className="px-6 py-2.5 border border-slate-200 text-slate-600 hover:bg-slate-100 text-sm font-semibold rounded-xl transition-colors shadow-sm whitespace-nowrap flex items-center justify-center"
                        >
                          <LogOut className="w-4 h-4 mr-1" />
                          설정 변경
                        </button>
                      )}
                    </form>
                  </div>
                </div>

                {/* 2. Domain Selection */}
                <div className={`bg-white p-6 rounded-3xl border border-slate-200 shadow-sm transition-opacity ${!isApiKeySet ? 'opacity-50 pointer-events-none' : ''}`}>
                  <label className="block text-sm font-semibold text-slate-700 mb-3">2. 번역할 문서의 전문 분야 선택</label>
                  <div className="flex flex-wrap gap-2">
                    {domains.map(d => (
                      <button
                        key={d}
                        onClick={() => setDomain(d)}
                        className={`px-4 py-2 rounded-full text-sm font-medium transition-colors ${
                          domain === d 
                            ? 'bg-blue-600 text-white shadow-md' 
                            : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                        }`}
                      >
                        {d}
                      </button>
                    ))}
                  </div>
                </div>

                {/* 3. File Upload Area */}
                <div 
                  className={`border-2 border-dashed bg-white rounded-3xl p-12 text-center transition-all duration-200 ease-in-out group shadow-sm ${
                    !isApiKeySet 
                      ? 'border-slate-200 opacity-50 cursor-not-allowed' 
                      : 'border-slate-300 cursor-pointer hover:border-blue-500 hover:bg-blue-50'
                  }`}
                  onDragOver={onDragOver}
                  onDrop={onDrop}
                  onClick={() => isApiKeySet && fileInputRef.current?.click()}
                >
                  <input 
                    type="file" 
                    ref={fileInputRef} 
                    className="hidden" 
                    accept=".pdf"
                    onChange={(e) => e.target.files && handleFileUpload(e.target.files[0])}
                    disabled={!isApiKeySet}
                  />
                  <div className={`w-20 h-20 mx-auto mb-6 rounded-full flex items-center justify-center transition-colors ${
                    !isApiKeySet ? 'bg-slate-50' : 'bg-slate-100 group-hover:bg-blue-100'
                  }`}>
                    <Upload className={`w-10 h-10 ${!isApiKeySet ? 'text-slate-300' : 'text-slate-400 group-hover:text-blue-600'}`} />
                  </div>
                  <h3 className="text-xl font-semibold text-slate-700 mb-2">
                    {isApiKeySet ? '3. 클릭하거나 PDF 파일을 끌어다 놓으세요' : 'API 키를 먼저 설정해 주세요'}
                  </h3>
                </div>
              </div>
            )}

            {file && (
              <div className="space-y-6">
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                  <div className="flex items-center space-x-4 w-full sm:w-auto">
                    <div className="w-12 h-12 bg-red-100 text-red-600 rounded-xl flex items-center justify-center flex-shrink-0">
                      <FileText className="w-6 h-6" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-slate-800 truncate" title={file.name}>{file.name}</p>
                      <p className="text-sm text-slate-500">{(file.size / 1024 / 1024).toFixed(2)} MB</p>
                    </div>
                  </div>

                  <div className="flex items-center space-x-3 w-full sm:w-auto">
                    {isProcessing && (
                      <div className="flex items-center text-blue-600 bg-blue-50 px-4 py-2 rounded-lg text-sm font-medium">
                        <Loader2 className="w-4 h-4 mr-2 animate-spin" />
                        {progressStatus}
                      </div>
                    )}
                    {!isProcessing && results.length > 0 && (
                      <button 
                        onClick={downloadText}
                        className="flex-1 sm:flex-none flex items-center justify-center px-5 py-2.5 bg-slate-900 text-white rounded-xl hover:bg-slate-800 transition-colors shadow-md text-sm font-medium"
                      >
                        <Download className="w-4 h-4 mr-2" />
                        번역본 저장 (.md)
                      </button>
                    )}
                  </div>
                </div>

                <div className="space-y-4">
                  {results.map((result) => (
                    <div key={result.page} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                      <div className="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center justify-between">
                        <span className="font-semibold text-slate-700 flex items-center">
                          <File className="w-4 h-4 mr-2 text-slate-400" />
                          페이지 {result.page}
                        </span>
                        <div className="flex items-center text-xs font-medium">
                          {result.status === 'extracting' && <span className="text-amber-600 flex items-center"><Loader2 className="w-3 h-3 mr-1 animate-spin" />분석 중</span>}
                          {result.status === 'translating' && <span className="text-blue-600 flex items-center"><Loader2 className="w-3 h-3 mr-1 animate-spin" />번역 중</span>}
                          {result.status === 'done' && <span className="text-green-600 flex items-center"><CheckCircle className="w-3 h-3 mr-1" />완료</span>}
                          {result.status === 'error' && <span className="text-red-600 flex items-center"><AlertCircle className="w-3 h-3 mr-1" />오류</span>}
                        </div>
                      </div>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-slate-100">
                        <div className="p-5 md:p-6 bg-slate-50/50">
                          <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Original</h4>
                          <div className="rounded-xl overflow-hidden border border-slate-200 bg-white">
                            {result.originalImage ? (
                              <img src={result.originalImage} alt={`Page ${result.page}`} className="w-full h-auto" />
                            ) : (
                              <div className="h-64 flex items-center justify-center text-slate-300 italic text-sm">이미지 로딩 중...</div>
                            )}
                          </div>
                        </div>

                        <div className="p-5 md:p-6 bg-white relative">
                          <h4 className="text-xs font-bold text-blue-500 uppercase tracking-wider mb-3">Translated</h4>
                          <div className="prose prose-slate prose-sm max-w-none text-slate-800 break-words">
                             {result.status === 'done' || result.status === 'error' ? (
                               formatTranslatedText(result.translated, result.status)
                             ) : (
                               <div className="flex flex-col space-y-2 animate-pulse">
                                 <div className="h-4 bg-slate-100 rounded w-full"></div>
                                 <div className="h-4 bg-slate-100 rounded w-5/6"></div>
                                 <div className="h-4 bg-slate-100 rounded w-4/5"></div>
                               </div>
                             )}
                          </div>
                          <div className="hidden md:flex absolute top-1/2 -left-3 -mt-3 w-6 h-6 bg-white border border-slate-200 rounded-full items-center justify-center z-10 shadow-sm text-slate-300">
                             <ChevronRight className="w-4 h-4" />
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                  
                  {!isProcessing && results.length > 0 && (
                    <div className="flex justify-center mt-8 pb-8">
                      <button 
                        onClick={handleReset}
                        className="flex items-center px-6 py-3 bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 font-semibold rounded-xl transition-colors shadow-sm"
                      >
                        <RefreshCw className="w-5 h-5 mr-2 text-slate-500" />
                        새로운 파일 번역하기
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
