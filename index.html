<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF AI 번역기</title>
  
  <!-- 1. Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. PDF.js (브라우저에서 직접 PDF 추출용) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // PDF 엔진 초기화
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <!-- 3. Babel (브라우저에서 React JSX 문법을 즉시 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <div id="root"></div>

  <!-- React 애플리케이션 코드 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useCallback, useRef } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { Upload, FileText, Languages, Download, CheckCircle, AlertCircle, Loader2, File, ChevronRight, RefreshCw, Key, LogOut, Settings, Info } from 'https://esm.sh/lucide-react@0.294.0';

    // --- 헬퍼 함수: AI가 알려준 좌표를 바탕으로 원본 이미지에서 그림만 잘라내기 ---
    const cropImageFromBase64 = (base64Str, y1, x1, y2, x2) => {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const w = img.width;
          const h = img.height;
          
          const sy = Math.max(0, (y1 / 1000) * h);
          const sx = Math.max(0, (x1 / 1000) * w);
          const ey = Math.min(h, (y2 / 1000) * h);
          const ex = Math.min(w, (x2 / 1000) * w);
          const sw = ex - sx;
          const sh = ey - sy;

          if (sw <= 0 || sh <= 0) {
            resolve(null);
            return;
          }
          
          canvas.width = sw;
          canvas.height = sh;
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
          resolve(canvas.toDataURL('image/jpeg', 0.9));
        };
        img.onerror = () => resolve(null);
        img.src = base64Str;
      });
    };

    function App() {
      const [userApiKey, setUserApiKey] = useState('');
      const [tempApiKey, setTempApiKey] = useState('');
      
      // 모델 설정을 더 안정적인 식별자로 관리
      const [selectedModel, setSelectedModel] = useState('gemini-1.5-flash');
      const [tempModel, setTempModel] = useState('gemini-1.5-flash');
      const [isApiKeySet, setIsApiKeySet] = useState(false);
      const [showManualModel, setShowManualModel] = useState(false);

      const [file, setFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [progressStatus, setProgressStatus] = useState('');
      const [results, setResults] = useState([]);
      const [error, setError] = useState('');
      const [domain, setDomain] = useState('일반');
      const fileInputRef = useRef(null);

      const domains = ['일반', 'IT/소프트웨어', '의학/보건', '법률/행정', '경제/경영', '기계/공학', '자연과학', '인문/예술', '교육학'];
      
      // 최신 구글 API 모델 목록 업데이트
      const modelOptions = [
        { id: 'gemini-1.5-flash', name: 'Gemini 1.5 Flash (가장 빠름)' },
        { id: 'gemini-1.5-pro', name: 'Gemini 1.5 Pro (높은 정확도)' },
        { id: 'gemini-2.0-flash-exp', name: 'Gemini 2.0 Flash Exp (최신 기능)' },
        { id: 'gemini-2.5-flash-preview-09-2025', name: 'Gemini 2.5 Preview (Canvas용)' }
      ];

      const handleApiKeySubmit = (e) => {
        if (e) e.preventDefault();
        const key = tempApiKey.trim();
        setUserApiKey(key); 
        
        // Canvas 내부 테스트가 아닐 경우 선택된 모델 적용
        if (key) {
          setSelectedModel(tempModel);
        } else {
          // Canvas 내부용 자동 키 주입 환경을 위해 모델 고정
          setSelectedModel('gemini-2.5-flash-preview-09-2025');
        }
        
        setIsApiKeySet(true);
        setError(''); 
      };

      const handleApiKeyReset = () => {
        if (window.confirm("설정을 초기화하시겠습니까?")) {
          setUserApiKey('');
          setTempApiKey('');
          setIsApiKeySet(false);
          setFile(null);
          setResults([]);
        }
      };

      const translatePageImage = async (base64Image, currentDomain, previousContext = "", retries = 5) => {
        if (!base64Image) return '';
        
        const delays = [1000, 2000, 4000, 8000, 16000];
        const base64Data = base64Image.split(',')[1];
        
        // v1beta는 최신 모델과 systemInstruction 기능을 위해 가장 권장되는 버전입니다.
        const apiVersion = 'v1beta';
        
        const contextPrompt = previousContext 
          ? `\n\n[이전 페이지 문맥 참고]\n이전 페이지의 마지막 번역 내용은 다음과 같습니다:\n"... ${previousContext}"\n\n*중요: 이전 페이지에서 문장이 마침표로 끝나지 않고 끊어졌다면, 현재 페이지의 첫 부분과 자연스럽게 연결하여 하나의 완성된 문장으로 번역하세요. 완성된 번역 결과는 현재 페이지 번역의 맨 처음에 위치하게 하세요.*`
          : "";

        for (let i = 0; i < retries; i++) {
          try {
            // URL 생성 시 'models/' 프리픽스가 정확한지 확인
            const url = `https://generativelanguage.googleapis.com/${apiVersion}/models/${selectedModel}:generateContent?key=${userApiKey}`;
            
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ 
                  parts: [
                    { text: `다음 문서 이미지를 한국어로 번역해주세요. \n\n[전문 분야: ${currentDomain}]${contextPrompt}\n\n지시사항:\n1. 지정된 전문 분야에서 가장 널리 사용되는 자연스러운 용어를 사용하세요.\n2. 문서에 표(Table)가 있다면, 마크다운 표 형식(| 항목 | 내용 |)을 사용하여 구조를 최대한 원본과 동일하게 재현하세요.\n3. 문서에 그림, 그래프, 로고, 사진 등이 있다면 반드시 해당 그림이 있는 원본 이미지 상의 영역 좌표(0~1000 비율)를 찾아 정확히 \`[IMAGE|ymin|xmin|ymax|xmax|간략설명]\` 형태의 태그 하나로 표시하세요. (예시: \`[IMAGE|150|200|450|800|차트 분석]\`).\n4. 전체적인 문단 배치나 줄바꿈 등의 포맷팅을 원본 문서와 최대한 유사하게 유지하세요.\n5. 페이지 구분으로 인해 잘린 문장은 현재 페이지 번역 시작 부분에서 매끄럽게 완성해주세요.` },
                    { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                  ] 
                }],
                systemInstruction: { 
                  parts: [{ text: "You are a professional translator specializing in English to Korean translation. You accurately translate text from document images while maintaining structural formatting like tables." }] 
                }
              })
            });

            if (!response.ok) {
              const errText = await response.text();
              let detailedError = `HTTP ${response.status}`;
              try {
                const errJson = JSON.parse(errText);
                if (errJson.error) {
                  detailedError += `: ${errJson.error.message || errJson.error.status}`;
                }
              } catch(e) {
                detailedError += ` - ${errText.substring(0, 100)}`;
              }
              
              // 404 에러의 경우 사용자에게 가이드 제공
              if (response.status === 404) {
                throw new Error(`${detailedError}\n\n사유: 선택한 모델(${selectedModel})을 이 API 버전에서 찾을 수 없습니다. API 키가 해당 모델을 지원하는지 확인하거나 '설정 변경'을 통해 다른 모델(예: gemini-1.5-flash)을 시도해 보세요.`);
              }
              
              throw new Error(detailedError);
            }
            
            const result = await response.json();
            let translatedText = result.candidates?.[0]?.content?.parts?.[0]?.text || "번역 결과를 가져오지 못했습니다.";

            // 이미지 좌표 태그 파싱 및 크롭
            const imageRegex = /\[IMAGE\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(.*?)\]/ig;
            const matches = [...translatedText.matchAll(imageRegex)];
            
            for (const m of matches) {
              const fullMatch = m[0];
              const y1 = parseInt(m[1], 10);
              const x1 = parseInt(m[2], 10);
              const y2 = parseInt(m[3], 10);
              const x2 = parseInt(m[4], 10);
              const desc = m[5].trim();
              
              try {
                const croppedBase64 = await cropImageFromBase64(base64Image, y1, x1, y2, x2);
                if (croppedBase64) {
                  translatedText = translatedText.replace(fullMatch, `\n\n![${desc}](${croppedBase64})\n\n`);
                } else {
                  translatedText = translatedText.replace(fullMatch, `\n\n[그림: ${desc}]\n\n`);
                }
              } catch (e) {
                translatedText = translatedText.replace(fullMatch, `\n\n[그림: ${desc}]\n\n`);
              }
            }

            return translatedText;
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(resolve => setTimeout(resolve, delays[i]));
          }
        }
      };

      const handleFileUpload = async (uploadedFile) => {
        if (!uploadedFile || uploadedFile.type !== 'application/pdf') {
          setError("PDF 파일만 업로드 가능합니다.");
          return;
        }

        setFile(uploadedFile);
        setError('');
        setIsProcessing(true);
        setResults([]);
        setProgressStatus('PDF 파일을 읽는 중입니다...');

        try {
          const arrayBuffer = await uploadedFile.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument(arrayBuffer).promise;
          const numPages = pdf.numPages;
          
          const initialResults = Array.from({ length: numPages }, (_, i) => ({
            page: i + 1,
            originalImage: '',
            translated: '',
            status: 'pending'
          }));
          setResults(initialResults);

          let previousContext = "";

          for (let i = 1; i <= numPages; i++) {
            setResults(prev => prev.map(r => r.page === i ? { ...r, status: 'extracting' } : r));
            setProgressStatus(`페이지 ${i}/${numPages} 분석 중...`);
            
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);
            
            setResults(prev => prev.map(r => r.page === i ? { ...r, originalImage: base64Image, status: 'translating' } : r));
            setProgressStatus(`페이지 ${i}/${numPages} AI 전문 번역 중...`);

            try {
              const translatedText = await translatePageImage(base64Image, domain, previousContext);
              setResults(prev => prev.map(r => r.page === i ? { ...r, translated: translatedText, status: 'done' } : r));
              previousContext = translatedText.slice(-150).trim();
            } catch (err) {
              console.error(`Page ${i} Error:`, err);
              setResults(prev => prev.map(r => r.page === i ? { 
                ...r, 
                translated: `[번역 오류]\n사유: ${err.message}`, 
                status: 'error' 
              } : r));
              previousContext = ""; 
            }
          }
          
          setProgressStatus('모든 페이지 처리가 완료되었습니다.');
        } catch (err) {
          console.error(err);
          setError("PDF 문서를 처리할 수 없습니다. 암호가 걸려있거나 손상된 파일인지 확인해 주세요.");
        } finally {
          setIsProcessing(false);
        }
      };

      const onDragOver = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
      }, []);

      const onDrop = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFileUpload(e.dataTransfer.files[0]);
        }
      }, [userApiKey, selectedModel]); 

      const handleReset = () => {
        setFile(null);
        setResults([]);
        setError('');
        setProgressStatus('');
      };

      const downloadText = () => {
        if (results.length === 0) return;
        
        let textContent = `# ${file.name} 번역 결과\n\n`;
        textContent += `**전문 분야:** ${domain}\n**AI 모델:** ${selectedModel}\n\n---\n\n`;
        
        results.forEach(r => {
          textContent += `## 페이지 ${r.page}\n\n${r.translated}\n\n---\n\n`;
        });

        const blob = new Blob([textContent], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `번역_${file.name.replace('.pdf', '')}.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const formatTranslatedText = (text, status) => {
        if (!text) return <span className="italic text-slate-400 font-normal">번역 결과가 없습니다.</span>;
        
        const isError = status === 'error';
        const parts = text.split(/!\[(.*?)\]\((data:image\/[^)]+)\)/g);
        
        const elements = [];
        for (let i = 0; i < parts.length; i += 3) {
          if (parts[i]) {
            elements.push(<span key={`text-${i}`}>{parts[i]}</span>);
          }
          if (i + 1 < parts.length) {
            const alt = parts[i+1];
            const src = parts[i+2];
            elements.push(
              <div key={`img-${i}`} className="my-6 border border-slate-200 rounded-2xl overflow-hidden bg-slate-100 p-2 shadow-sm flex flex-col items-center w-full">
                <img src={src} alt={alt} className="max-w-full h-auto rounded-xl shadow-inner" />
                {alt && <p className="text-center text-[10px] text-slate-500 mt-2 font-medium">{alt}</p>}
              </div>
            );
          }
        }
        
        return (
          <div className={`whitespace-pre-wrap font-sans leading-relaxed text-[15px] ${isError ? 'text-red-500' : 'text-slate-800'}`}>
            {elements}
          </div>
        );
      };

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-6xl mx-auto space-y-6">
            
            <div className="text-center space-y-3 mb-10">
              <div className="flex items-center justify-center space-x-4 mb-4">
                <div className="p-3.5 bg-blue-600 rounded-[2rem] shadow-xl shadow-blue-200 rotate-3">
                  <Languages className="w-9 h-9 text-white -rotate-3" />
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter">PDF AI 번역기</h1>
              </div>
              <p className="text-slate-500 max-w-xl mx-auto font-medium">
                표와 그림을 유지하며 전문 분야에 특화된 AI 번역 서비스를 경험하세요.
              </p>
            </div>

            {error && (
              <div className="bg-red-50 border border-red-200 text-red-700 p-5 rounded-2xl flex items-start shadow-sm animate-in fade-in slide-in-from-top-4 duration-300">
                <AlertCircle className="w-5 h-5 mr-3 mt-0.5 flex-shrink-0" />
                <div className="text-sm">
                  <p className="font-bold mb-1">오류가 발생했습니다</p>
                  <p className="whitespace-pre-wrap opacity-90">{error}</p>
                </div>
              </div>
            )}

            {!file && (
              <div className="mt-8 space-y-6">
                
                {/* 1. API & Model Setup */}
                <div className="bg-white p-7 rounded-[2.5rem] border border-slate-200 shadow-xl shadow-slate-200/50">
                  <div className="w-full">
                    <div className="flex items-center justify-between mb-4">
                      <label className="text-base font-bold text-slate-800 flex items-center">
                        <Key className="w-5 h-5 mr-2 text-blue-500" />
                        1. API 서비스 설정
                      </label>
                      <button 
                        onClick={() => setShowManualModel(!showManualModel)}
                        className="text-[11px] font-bold text-slate-400 hover:text-blue-600 flex items-center transition-colors"
                      >
                        <Settings className="w-3.5 h-3.5 mr-1.5" />
                        커스텀 모델 식별자 {showManualModel ? '숨기기' : '사용하기'}
                      </button>
                    </div>

                    <form onSubmit={handleApiKeySubmit} className="space-y-4">
                      <div className="flex flex-col md:flex-row gap-3">
                        <input
                          type="password"
                          placeholder="Google Gemini API 키 (AIzaSy...)"
                          value={tempApiKey}
                          onChange={(e) => setTempApiKey(e.target.value)}
                          disabled={isApiKeySet}
                          className="flex-1 px-5 py-3.5 text-sm rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-400"
                        />
                        
                        {showManualModel ? (
                          <input
                            type="text"
                            placeholder="직접 입력 (예: gemini-1.5-flash-8b)"
                            value={tempModel}
                            onChange={(e) => setTempModel(e.target.value)}
                            disabled={isApiKeySet}
                            className="w-full md:w-64 px-5 py-3.5 text-sm rounded-2xl border border-blue-200 bg-blue-50/50 font-mono outline-none"
                          />
                        ) : (
                          <select
                            value={tempModel}
                            onChange={(e) => setTempModel(e.target.value)}
                            disabled={isApiKeySet}
                            className="w-full md:w-64 px-4 py-3.5 text-sm rounded-2xl border border-slate-200 focus:border-blue-500 outline-none transition-all disabled:bg-slate-50 appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2020%2020%22%3E%3Cpath%20stroke%3D%22%236b7280%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%221.5%22%20d%3D%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E')] bg-[length:1.25rem_1.25rem] bg-[right_1rem_center] bg-no-repeat"
                          >
                            {modelOptions.map(opt => (
                              <option key={opt.id} value={opt.id}>{opt.name}</option>
                            ))}
                          </select>
                        )}

                        {!isApiKeySet ? (
                          <button
                            type="submit"
                            className="px-8 py-3.5 bg-slate-900 hover:bg-black text-white text-sm font-bold rounded-2xl transition-all shadow-lg active:scale-95"
                          >
                            설정 완료
                          </button>
                        ) : (
                          <button
                            type="button"
                            onClick={handleApiKeyReset}
                            className="px-8 py-3.5 border-2 border-slate-100 text-slate-500 hover:bg-slate-50 text-sm font-bold rounded-2xl transition-all flex items-center justify-center"
                          >
                            <LogOut className="w-4 h-4 mr-2" />
                            재설정
                          </button>
                        )}
                      </div>
                      
                      {!isApiKeySet && (
                        <div className="flex items-start p-4 bg-blue-50/50 rounded-2xl border border-blue-100/50">
                          <Info className="w-4 h-4 text-blue-500 mr-3 mt-0.5" />
                          <div className="text-[11px] text-blue-700/80 leading-relaxed">
                            <p><strong>GitHub Pages 배포 후 사용 시:</strong> 반드시 구글 AI Studio에서 개인 API 키를 발급받아야 합니다.</p>
                            <p className="mt-1 opacity-70">* API 키는 서버에 저장되지 않고 오직 현재 브라우저 내에서만 사용됩니다.</p>
                          </div>
                        </div>
                      )}
                    </form>
                  </div>
                </div>

                {/* 2. Domain Selection */}
                <div className={`bg-white p-7 rounded-[2.5rem] border border-slate-200 shadow-xl shadow-slate-200/50 transition-all duration-500 ${!isApiKeySet ? 'opacity-30 pointer-events-none scale-[0.98]' : 'opacity-100'}`}>
                  <label className="block text-base font-bold text-slate-800 mb-5">2. 전문 분야 선택</label>
                  <div className="flex flex-wrap gap-2.5">
                    {domains.map(d => (
                      <button
                        key={d}
                        onClick={() => setDomain(d)}
                        className={`px-5 py-2.5 rounded-2xl text-sm font-bold transition-all ${
                          domain === d 
                            ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 ring-2 ring-blue-600 ring-offset-2' 
                            : 'bg-slate-100 text-slate-500 hover:bg-slate-200'
                        }`}
                      >
                        {d}
                      </button>
                    ))}
                  </div>
                </div>

                {/* 3. File Upload Area */}
                <div 
                  className={`border-2 border-dashed bg-white rounded-[3rem] p-16 text-center transition-all duration-500 shadow-xl shadow-slate-200/50 group ${
                    !isApiKeySet 
                      ? 'border-slate-200 opacity-30 cursor-not-allowed' 
                      : 'border-slate-300 cursor-pointer hover:border-blue-500 hover:bg-blue-50/30'
                  }`}
                  onDragOver={onDragOver}
                  onDrop={onDrop}
                  onClick={() => isApiKeySet && fileInputRef.current?.click()}
                >
                  <input 
                    type="file" 
                    ref={fileInputRef} 
                    className="hidden" 
                    accept=".pdf"
                    onChange={(e) => e.target.files && handleFileUpload(e.target.files[0])}
                    disabled={!isApiKeySet}
                  />
                  <div className={`w-24 h-24 mx-auto mb-6 rounded-[2rem] flex items-center justify-center transition-all duration-300 ${
                    !isApiKeySet ? 'bg-slate-50 text-slate-200' : 'bg-blue-50 text-blue-500 group-hover:scale-110 group-hover:rotate-6'
                  }`}>
                    <Upload className="w-10 h-10" />
                  </div>
                  <h3 className="text-2xl font-black text-slate-800 mb-2">
                    {isApiKeySet ? '3. 번역할 PDF를 선택해 주세요' : '1단계 설정을 먼저 완료해 주세요'}
                  </h3>
                  <p className="text-slate-400 text-sm font-medium">마우스로 파일을 끌어다 놓아도 바로 시작할 수 있습니다.</p>
                </div>
              </div>
            )}

            {file && (
              <div className="space-y-6 pb-20">
                {/* Processing Header */}
                <div className="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6">
                  <div className="flex items-center space-x-5 w-full md:w-auto">
                    <div className="w-14 h-14 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-inner">
                      <FileText className="w-7 h-7" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="font-bold text-slate-900 truncate text-lg" title={file.name}>{file.name}</p>
                      <div className="flex items-center text-xs font-bold text-slate-400 mt-1 uppercase tracking-tighter">
                        <span className="bg-slate-100 px-2 py-0.5 rounded mr-2">{(file.size / 1024 / 1024).toFixed(2)} MB</span>
                        <span className="text-blue-500">{selectedModel}</span>
                      </div>
                    </div>
                  </div>

                  <div className="flex items-center space-x-4 w-full md:w-auto">
                    {isProcessing && (
                      <div className="flex items-center text-blue-600 bg-blue-50 px-5 py-2.5 rounded-2xl text-sm font-bold shadow-sm animate-pulse">
                        <Loader2 className="w-4 h-4 mr-2.5 animate-spin" />
                        {progressStatus}
                      </div>
                    )}
                    {!isProcessing && results.length > 0 && (
                      <button 
                        onClick={downloadText}
                        className="flex-1 md:flex-none flex items-center justify-center px-8 py-3.5 bg-slate-900 text-white rounded-2xl hover:bg-black text-sm font-bold shadow-xl transition-all active:scale-95"
                      >
                        <Download className="w-4 h-4 mr-2.5" />
                        결과 다운로드 (.md)
                      </button>
                    )}
                  </div>
                </div>

                {/* Page Results */}
                <div className="space-y-6">
                  {results.map((result) => (
                    <div key={result.page} className="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/70 border border-slate-100 overflow-hidden flex flex-col animate-in fade-in zoom-in-95 duration-500">
                      <div className="bg-slate-50/80 px-7 py-4 border-b border-slate-100 flex items-center justify-between">
                        <span className="font-black text-slate-800 flex items-center text-sm uppercase tracking-wide">
                          <File className="w-4 h-4 mr-2.5 text-slate-400" />
                          PAGE {result.page}
                        </span>
                        <div className="flex items-center">
                          {result.status === 'extracting' && <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[10px] font-black uppercase flex items-center"><Loader2 className="w-3 h-3 mr-1.5 animate-spin" />Analysing</span>}
                          {result.status === 'translating' && <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase flex items-center"><Loader2 className="w-3 h-3 mr-1.5 animate-spin" />Translating</span>}
                          {result.status === 'done' && <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-black uppercase flex items-center"><CheckCircle className="w-3 h-3 mr-1.5" />Finished</span>}
                          {result.status === 'error' && <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-[10px] font-black uppercase flex items-center"><AlertCircle className="w-3 h-3 mr-1.5" />Failed</span>}
                        </div>
                      </div>
                      
                      <div className="grid grid-cols-1 lg:grid-cols-2 divide-y lg:divide-y-0 lg:divide-x divide-slate-100">
                        {/* Original Visual */}
                        <div className="p-6 md:p-8 bg-slate-50/30">
                          <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Source (Original Page)</h4>
                          <div className="rounded-[2rem] overflow-hidden border-4 border-white bg-white shadow-2xl shadow-slate-300/50">
                            {result.originalImage ? (
                              <img src={result.originalImage} alt={`Page ${result.page}`} className="w-full h-auto" />
                            ) : (
                              <div className="h-80 flex flex-col items-center justify-center text-slate-300 italic text-sm space-y-4">
                                <Loader2 className="w-10 h-10 animate-spin opacity-20" />
                                <span>이미지 로딩 중...</span>
                              </div>
                            )}
                          </div>
                        </div>

                        {/* Translation Content */}
                        <div className="p-6 md:p-8 bg-white relative">
                          <h4 className="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-6">Translation (Korean)</h4>
                          <div className="prose prose-slate prose-sm max-w-none break-words min-h-[150px]">
                             {result.status === 'done' || result.status === 'error' ? (
                               formatTranslatedText(result.translated, result.status)
                             ) : (
                               <div className="space-y-4 pt-4">
                                 <div className="h-3.5 bg-slate-100 rounded-full w-full animate-pulse"></div>
                                 <div className="h-3.5 bg-slate-100 rounded-full w-11/12 animate-pulse"></div>
                                 <div className="h-3.5 bg-slate-100 rounded-full w-10/12 animate-pulse"></div>
                                 <div className="h-3.5 bg-slate-100 rounded-full w-11/12 animate-pulse"></div>
                                 <div className="h-3.5 bg-slate-100 rounded-full w-8/12 animate-pulse"></div>
                               </div>
                             )}
                          </div>
                          <div className="hidden lg:flex absolute top-1/2 -left-3.5 -mt-3.5 w-7 h-7 bg-white border-2 border-slate-100 rounded-full items-center justify-center z-10 shadow-lg text-slate-300">
                             <ChevronRight className="w-4 h-4" />
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                  
                  {!isProcessing && results.length > 0 && (
                    <div className="flex justify-center mt-12 mb-20">
                      <button 
                        onClick={handleReset}
                        className="group flex items-center px-10 py-4 bg-white border-2 border-slate-200 text-slate-600 hover:text-slate-900 hover:border-slate-400 font-bold rounded-3xl transition-all shadow-sm active:scale-95"
                      >
                        <RefreshCw className="w-5 h-5 mr-3 text-slate-400 group-hover:rotate-180 transition-transform duration-700" />
                        초기 화면으로 돌아가기
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    /* 스크롤바 디자인 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    
    /* 폰트 보정 */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
    
    /* 마크다운 표 스타일 보정 */
    .prose table { border-collapse: collapse; width: 100%; margin: 1.5rem 0; border-radius: 0.75rem; overflow: hidden; font-size: 0.85rem; }
    .prose th { background-color: #f1f5f9; padding: 0.75rem; font-weight: 700; border: 1px solid #e2e8f0; }
    .prose td { padding: 0.75rem; border: 1px solid #e2e8f0; }
  </style>
</body>
</html>
