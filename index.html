<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF AI 번역기</title>
  
  <!-- 1. Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <!-- 3. Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 4. marked.js (마크다운 → HTML 렌더링) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- 5. docx.js (Word 문서 생성) -->
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useCallback, useRef } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { Upload, FileText, Languages, Download, CheckCircle, AlertCircle, Loader2, File, ChevronRight, RefreshCw, Key, LogOut, Settings, Info, ChevronDown } from 'https://esm.sh/lucide-react@0.294.0';

    // marked.js 설정
    if (window.marked) {
      window.marked.setOptions({
        breaks: true,
        gfm: true,
      });
    }

    // 이미지 크롭 헬퍼
    const cropImageFromBase64 = (base64Str, y1, x1, y2, x2) => {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const w = img.width;
          const h = img.height;
          const sy = Math.max(0, (y1 / 1000) * h);
          const sx = Math.max(0, (x1 / 1000) * w);
          const ey = Math.min(h, (y2 / 1000) * h);
          const ex = Math.min(w, (x2 / 1000) * w);
          const sw = ex - sx;
          const sh = ey - sy;
          if (sw <= 0 || sh <= 0) { resolve(null); return; }
          canvas.width = sw;
          canvas.height = sh;
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
          resolve(canvas.toDataURL('image/jpeg', 0.9));
        };
        img.onerror = () => resolve(null);
        img.src = base64Str;
      });
    };

    function App() {
      const [userApiKey, setUserApiKey] = useState('');
      const [tempApiKey, setTempApiKey] = useState('');
      
      const [selectedModel, setSelectedModel] = useState('gemini-2.5-flash-preview-05-20');
      const [tempModel, setTempModel] = useState('gemini-2.5-flash-preview-05-20');
      const [isApiKeySet, setIsApiKeySet] = useState(false);
      const [showManualModel, setShowManualModel] = useState(false);

      const [file, setFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [progressStatus, setProgressStatus] = useState('');
      const [results, setResults] = useState([]);
      const [error, setError] = useState('');
      const [domain, setDomain] = useState('일반');
      const [showDownloadMenu, setShowDownloadMenu] = useState(false);
      const fileInputRef = useRef(null);
      const downloadMenuRef = useRef(null);

      const domains = ['일반', 'IT/소프트웨어', '의학/보건', '법률/행정', '경제/경영', '기계/공학', '자연과학', '인문/예술', '교육학'];

      // 동적으로 로드된 모델 목록 (API 키 입력 후 자동 조회)
      const [modelOptions, setModelOptions] = useState([
        { id: 'gemini-2.5-flash-preview-05-20', name: 'Gemini 2.5 Flash Preview (권장)' },
        { id: 'gemini-2.5-pro-preview-06-05',   name: 'Gemini 2.5 Pro Preview' },
        { id: 'gemini-3-flash-preview',          name: 'Gemini 3 Flash Preview' },
        { id: 'gemini-2.5-flash',                name: 'Gemini 2.5 Flash' },
      ]);
      const [isLoadingModels, setIsLoadingModels] = useState(false);

      const handleApiKeySubmit = async (e) => {
        if (e) e.preventDefault();
        const key = tempApiKey.trim();
        if (!key) { setError('API 키를 입력해 주세요.'); return; }

        setIsLoadingModels(true);
        setError('');

        try {
          // API 키로 실제 사용 가능한 모델 목록 조회
          const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models?key=${key}&pageSize=100`
          );
          if (res.ok) {
            const data = await res.json();
            // generateContent를 지원하는 gemini- 모델만 필터
            const filtered = (data.models || [])
              .filter(m =>
                m.name.includes('gemini') &&
                (m.supportedGenerationMethods || []).includes('generateContent') &&
                !m.name.includes('embedding') &&
                !m.name.includes('aqa') &&
                !m.name.includes('image') &&
                !m.name.includes('audio') &&
                !m.name.includes('live') &&
                !m.name.includes('tts')
              )
              .map(m => {
                const id = m.name.replace('models/', '');
                // 표시 이름: displayName 우선, 없으면 id
                const displayName = m.displayName || id;
                return { id, name: displayName };
              })
              // 최신 모델이 위로 오도록 정렬
              .sort((a, b) => b.id.localeCompare(a.id));

            if (filtered.length > 0) {
              setModelOptions(filtered);
              // 현재 선택 모델이 목록에 없으면 첫 번째로 교체
              const firstId = filtered[0].id;
              const currentValid = filtered.some(m => m.id === tempModel);
              const finalModel = currentValid ? tempModel : firstId;
              setTempModel(finalModel);
              setSelectedModel(finalModel);
            }
          }
        } catch (_) {
          // 네트워크 오류 시 기본 목록 유지
        } finally {
          setIsLoadingModels(false);
        }

        setUserApiKey(key);
        setIsApiKeySet(true);
      };

      const handleApiKeyReset = () => {
        if (window.confirm("설정을 초기화하시겠습니까?")) {
          setUserApiKey('');
          setTempApiKey('');
          setIsApiKeySet(false);
          setFile(null);
          setResults([]);
          setError('');
        }
      };

      // 번역 품질 개선: 강화된 프롬프트 + 정확한 API 엔드포인트
      const translatePageImage = async (base64Image, currentDomain, previousContext = "", modelId, apiKey, retries = 5) => {
        if (!base64Image) return '';
        const delays = [1000, 2000, 4000, 8000, 16000];
        const base64Data = base64Image.split(',')[1];

        const contextPrompt = previousContext
          ? `\n\n[이전 페이지 문맥]\n이전 페이지 마지막 내용: "... ${previousContext}"\n→ 위 내용과 자연스럽게 이어지도록 번역하세요. 페이지 경계에서 끊긴 문장은 이 페이지 맨 앞에서 완성해 주세요.`
          : "";

        const translationPrompt = `아래 문서 이미지를 한국어로 번역해 주세요.

[전문 분야: ${currentDomain}]${contextPrompt}

=== 번역 지침 ===

1. **전문 용어**: "${currentDomain}" 분야에서 가장 널리 통용되는 정확한 한국어 용어를 사용하세요. 번역이 애매한 경우 원어를 괄호 안에 병기하세요. 예: 머신러닝(Machine Learning)

2. **표(Table) 처리**: 문서에 표가 있으면 반드시 아래 마크다운 표 형식으로 재현하세요.
   | 항목 1 | 항목 2 | 항목 3 |
   |--------|--------|--------|
   | 내용   | 내용   | 내용   |
   열 너비, 행 수, 병합 구조를 원본과 최대한 동일하게 유지하세요.

3. **그림·이미지 처리**: 그림, 차트, 그래프, 사진, 로고 등 시각 요소가 있을 때마다 반드시 해당 위치에 아래 태그를 삽입하세요 (0~1000 비율 좌표):
   \`[IMAGE|ymin|xmin|ymax|xmax|간략한 한국어 설명]\`
   예: \`[IMAGE|120|50|420|950|Q3 매출 성장률 막대 차트]\`

4. **포맷 유지**: 제목, 소제목, 글머리 기호, 번호 목록, 들여쓰기, 단락 구분을 원본과 동일하게 유지하세요.

5. **자연스러운 한국어**: 직역보다 의역을 우선하되, 기술·학술 문서의 정확성은 반드시 확보하세요.

6. **페이지 경계 문장**: 페이지 경계에서 잘린 문장은 문맥을 고려해 현재 페이지 맨 앞에서 완성해 주세요.

위 지침을 모두 준수하여 번역하세요.`;

        for (let i = 0; i < retries; i++) {
          try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;

            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{
                  parts: [
                    { text: translationPrompt },
                    { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                  ]
                }],
                systemInstruction: {
                  parts: [{ text: "You are an expert professional translator specializing in English-to-Korean translation of technical and academic documents. You reproduce document structure faithfully — including tables in markdown format, image position tags, headings, and paragraph breaks — while producing natural, precise Korean." }]
                },
                generationConfig: {
                  temperature: 0.1,
                  topP: 0.9,
                  maxOutputTokens: 8192,
                }
              })
            });

            if (!response.ok) {
              const errText = await response.text();
              let detailedError = `HTTP ${response.status}`;
              try {
                const errJson = JSON.parse(errText);
                if (errJson.error) detailedError += `: ${errJson.error.message || errJson.error.status}`;
              } catch(e) {
                detailedError += ` - ${errText.substring(0, 200)}`;
              }

              if (response.status === 404) {
                throw new Error(`${detailedError}\n\n→ 선택한 모델(${modelId})이 현재 API에서 지원되지 않습니다. '재설정' 후 다른 모델을 선택해 주세요.`);
              }
              if (response.status === 429) {
                throw new Error(`API 요청 한도 초과(429). 잠시 후 자동으로 재시도합니다...`);
              }
              if (response.status === 400) {
                throw new Error(`잘못된 요청(400): ${detailedError}\n\n→ API 키 또는 모델 설정을 확인해 주세요.`);
              }
              throw new Error(detailedError);
            }

            const result = await response.json();
            let translatedText = result.candidates?.[0]?.content?.parts?.[0]?.text || "번역 결과를 가져오지 못했습니다.";

            // 이미지 좌표 태그 파싱 및 크롭
            const imageRegex = /\[IMAGE\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(.*?)\]/ig;
            const matches = [...translatedText.matchAll(imageRegex)];

            for (const m of matches) {
              const fullMatch = m[0];
              const [y1, x1, y2, x2] = [m[1], m[2], m[3], m[4]].map(n => parseInt(n, 10));
              const desc = m[5].trim();
              try {
                const croppedBase64 = await cropImageFromBase64(base64Image, y1, x1, y2, x2);
                translatedText = translatedText.replace(
                  fullMatch,
                  croppedBase64
                    ? `\n\n![${desc}](${croppedBase64})\n\n`
                    : `\n\n[그림: ${desc}]\n\n`
                );
              } catch (e) {
                translatedText = translatedText.replace(fullMatch, `\n\n[그림: ${desc}]\n\n`);
              }
            }

            return translatedText;
          } catch (err) {
            if (i === retries - 1) throw err;
            if (err.message.includes('400') || err.message.includes('404')) throw err;
            await new Promise(resolve => setTimeout(resolve, delays[i]));
          }
        }
      };

      const handleFileUpload = async (uploadedFile) => {
        if (!uploadedFile || uploadedFile.type !== 'application/pdf') {
          setError("PDF 파일만 업로드 가능합니다.");
          return;
        }
        setFile(uploadedFile);
        setError('');
        setIsProcessing(true);
        setResults([]);
        setProgressStatus('PDF 파일을 읽는 중입니다...');

        try {
          const currentModel = selectedModel;
          const currentApiKey = userApiKey;

          const arrayBuffer = await uploadedFile.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument(arrayBuffer).promise;
          const numPages = pdf.numPages;

          setResults(Array.from({ length: numPages }, (_, i) => ({
            page: i + 1, originalImage: '', translated: '', status: 'pending'
          })));

          let previousContext = "";

          for (let i = 1; i <= numPages; i++) {
            setResults(prev => prev.map(r => r.page === i ? { ...r, status: 'extracting' } : r));
            setProgressStatus(`페이지 ${i} / ${numPages} 분석 중...`);

            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            const base64Image = canvas.toDataURL('image/jpeg', 0.85);

            setResults(prev => prev.map(r => r.page === i ? { ...r, originalImage: base64Image, status: 'translating' } : r));
            setProgressStatus(`페이지 ${i} / ${numPages} AI 번역 중...`);

            try {
              const translatedText = await translatePageImage(base64Image, domain, previousContext, currentModel, currentApiKey);
              setResults(prev => prev.map(r => r.page === i ? { ...r, translated: translatedText, status: 'done' } : r));
              previousContext = translatedText.replace(/!\[.*?\]\(data:image[^)]+\)/g, '').slice(-200).trim();
            } catch (err) {
              console.error(`Page ${i} Error:`, err);
              setResults(prev => prev.map(r => r.page === i ? {
                ...r,
                translated: `[번역 실패]\n오류 원인: ${err.message}`,
                status: 'error'
              } : r));
              previousContext = "";
            }
          }
          setProgressStatus('✅ 모든 페이지 처리가 완료되었습니다.');
        } catch (err) {
          console.error(err);
          setError("PDF 문서를 처리할 수 없습니다. 암호가 걸려있거나 손상된 파일인지 확인해 주세요.");
        } finally {
          setIsProcessing(false);
        }
      };

      const onDragOver = useCallback((e) => { e.preventDefault(); e.stopPropagation(); }, []);

      const onDrop = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFileUpload(e.dataTransfer.files[0]);
        }
      }, [userApiKey, selectedModel, domain]);

      const handleReset = () => {
        setFile(null);
        setResults([]);
        setError('');
        setProgressStatus('');
        setShowDownloadMenu(false);
      };

      const downloadMarkdown = () => {
        if (!results.length) return;
        let content = `# ${file.name} 번역 결과\n\n`;
        content += `> **전문 분야:** ${domain}  \n> **AI 모델:** ${selectedModel}  \n> **번역일:** ${new Date().toLocaleDateString('ko-KR')}\n\n---\n\n`;
        results.forEach(r => {
          content += `## 페이지 ${r.page}\n\n${r.translated}\n\n---\n\n`;
        });
        triggerDownload(content, `번역_${file.name.replace('.pdf', '')}.md`, 'text/markdown;charset=utf-8');
      };

      const downloadTxt = () => {
        if (!results.length) return;
        let content = `${file.name} 번역 결과\n`;
        content += `전문 분야: ${domain} | AI 모델: ${selectedModel} | 번역일: ${new Date().toLocaleDateString('ko-KR')}\n`;
        content += '='.repeat(60) + '\n\n';
        results.forEach(r => {
          content += `[ 페이지 ${r.page} ]\n\n`;
          const plainText = r.translated
            .replace(/!\[.*?\]\(data:image[^)]+\)/g, '[그림]')
            .replace(/#{1,6}\s/g, '')
            .replace(/\*\*(.*?)\*\*/g, '$1')
            .replace(/\|(.*)\|/g, (m) => m.replace(/\|/g, '\t').trim())
            .replace(/^[-*]\s/gm, '• ');
          content += plainText + '\n\n' + '-'.repeat(60) + '\n\n';
        });
        triggerDownload(content, `번역_${file.name.replace('.pdf', '')}.txt`, 'text/plain;charset=utf-8');
      };

      const downloadHtml = () => {
        if (!results.length) return;
        const pagesHtml = results.map(r => {
          const rendered = window.marked ? window.marked.parse(r.translated || '') : r.translated;
          return `
            <section class="page">
              <h2>페이지 ${r.page}</h2>
              <div class="content">${rendered}</div>
            </section>`;
        }).join('\n<hr>\n');

        const html = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>${file.name} 번역 결과</title>
<style>
  body { font-family: 'Noto Sans KR', sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #1e293b; line-height: 1.8; }
  h1 { font-size: 1.8rem; border-bottom: 3px solid #3b82f6; padding-bottom: 12px; }
  h2 { font-size: 1.2rem; color: #3b82f6; margin-top: 2rem; }
  .meta { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
  table { border-collapse: collapse; width: 100%; margin: 1.5rem 0; font-size: 0.9rem; }
  th { background: #f1f5f9; padding: 10px 14px; border: 1px solid #e2e8f0; font-weight: 700; }
  td { padding: 10px 14px; border: 1px solid #e2e8f0; }
  img { max-width: 100%; border-radius: 8px; margin: 1rem 0; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  hr { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
</style>
</head>
<body>
<h1>${file.name} 번역 결과</h1>
<p class="meta">전문 분야: ${domain} &nbsp;|&nbsp; AI 모델: ${selectedModel} &nbsp;|&nbsp; 번역일: ${new Date().toLocaleDateString('ko-KR')}</p>
${pagesHtml}
</body>
</html>`;
        triggerDownload(html, `번역_${file.name.replace('.pdf', '')}.html`, 'text/html;charset=utf-8');
      };

      const downloadDocx = async () => {
        if (!results.length) return;
        const docx = window.docx;
        if (!docx) {
          alert('Word 라이브러리를 불러오지 못했습니다. 페이지를 새로 고침 후 다시 시도해 주세요.');
          return;
        }

        const {
          Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
          ImageRun, HeadingLevel, AlignmentType, BorderStyle, WidthType,
          ShadingType, LevelFormat, PageBreak
        } = docx;

        const base64ToUint8Array = (base64) => {
          const b64 = base64.split(',')[1];
          const bin = atob(b64);
          const arr = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
          return arr;
        };

        const getImageSize = (base64) => new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
          img.onerror = () => resolve({ width: 400, height: 300 });
          img.src = base64;
        });

        const parseMarkdownTable = (lines) => {
          const rows = lines.filter(l => l.trim().startsWith('|') && !l.match(/^\|[-:\s|]+\|$/));
          if (rows.length === 0) return null;

          const border = { style: BorderStyle.SINGLE, size: 1, color: 'CCCCCC' };
          const borders = { top: border, bottom: border, left: border, right: border };

          const isHeader = (idx) => idx === 0;
          const tableRows = rows.map((row, rowIdx) => {
            const cells = row.split('|').filter((_, i, a) => i > 0 && i < a.length - 1);
            return new TableRow({
              children: cells.map(cell => new TableCell({
                borders,
                width: { size: Math.floor(9026 / cells.length), type: WidthType.DXA },
                margins: { top: 80, bottom: 80, left: 120, right: 120 },
                shading: isHeader(rowIdx)
                  ? { fill: 'EFF6FF', type: ShadingType.CLEAR }
                  : { fill: 'FFFFFF', type: ShadingType.CLEAR },
                children: [new Paragraph({
                  children: [new TextRun({
                    text: cell.trim(),
                    bold: isHeader(rowIdx),
                    font: 'Malgun Gothic',
                    size: 20,
                  })]
                })]
              }))
            });
          });

          const colCount = rows[0].split('|').filter((_, i, a) => i > 0 && i < a.length - 1).length;
          return new Table({
            width: { size: 9026, type: WidthType.DXA },
            columnWidths: Array(colCount).fill(Math.floor(9026 / colCount)),
            rows: tableRows,
          });
        };

        const textToDocxChildren = async (text) => {
          const elements = [];
          const lines = text.split('\n');
          let tableBuffer = [];
          let inTable = false;

          const flushTable = () => {
            if (tableBuffer.length > 0) {
              const tbl = parseMarkdownTable(tableBuffer);
              if (tbl) {
                elements.push(tbl);
                elements.push(new Paragraph({ children: [] })); // 표 뒤 여백
              }
              tableBuffer = [];
            }
            inTable = false;
          };

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];

            if (line.trim().startsWith('|')) {
              inTable = true;
              tableBuffer.push(line);
              continue;
            }
            if (inTable) flushTable();

            const imgMatch = line.match(/!\[(.*?)\]\((data:image\/(jpeg|png);base64,[^)]+)\)/);
            if (imgMatch) {
              try {
                const src = imgMatch[2];
                const mimeType = imgMatch[3] === 'png' ? 'image/png' : 'image/jpeg';
                const imgType = imgMatch[3] === 'png' ? 'png' : 'jpg';
                const { width, height } = await getImageSize(src);
                const maxEmuW = 5760000;
                const ratio = Math.min(1, maxEmuW / (width * 9144));
                const emuW = Math.round(width * 9144 * ratio);
                const emuH = Math.round(height * 9144 * ratio);
                elements.push(new Paragraph({
                  alignment: AlignmentType.CENTER,
                  children: [new ImageRun({
                    data: base64ToUint8Array(src),
                    transformation: { width: emuW / 9144, height: emuH / 9144 },
                    type: imgType,
                  })],
                }));
                if (imgMatch[1]) {
                  elements.push(new Paragraph({
                    alignment: AlignmentType.CENTER,
                    children: [new TextRun({ text: imgMatch[1], italics: true, size: 18, color: '64748B', font: 'Malgun Gothic' })]
                  }));
                }
              } catch (e) {
                elements.push(new Paragraph({ children: [new TextRun({ text: '[그림]', italics: true, color: '94A3B8', font: 'Malgun Gothic' })] }));
              }
              continue;
            }

            const headingMatch = line.match(/^(#{1,3})\s+(.*)/);
            if (headingMatch) {
              const level = [HeadingLevel.HEADING_1, HeadingLevel.HEADING_2, HeadingLevel.HEADING_3][headingMatch[1].length - 1];
              elements.push(new Paragraph({
                heading: level,
                children: [new TextRun({ text: headingMatch[2].trim(), font: 'Malgun Gothic' })]
              }));
              continue;
            }

            const bulletMatch = line.match(/^[-*•]\s+(.*)/);
            if (bulletMatch) {
              elements.push(new Paragraph({
                numbering: { reference: 'bullets', level: 0 },
                children: [new TextRun({ text: bulletMatch[1].trim(), font: 'Malgun Gothic', size: 22 })]
              }));
              continue;
            }

            const numMatch = line.match(/^\d+\.\s+(.*)/);
            if (numMatch) {
              elements.push(new Paragraph({
                numbering: { reference: 'numbers', level: 0 },
                children: [new TextRun({ text: numMatch[1].trim(), font: 'Malgun Gothic', size: 22 })]
              }));
              continue;
            }

            if (!line.trim()) {
              elements.push(new Paragraph({ children: [] }));
              continue;
            }

            const runParts = line.split(/(\*\*.*?\*\*)/g);
            const runs = runParts.map(part => {
              const boldMatch = part.match(/^\*\*(.*)\*\*$/);
              return new TextRun({
                text: boldMatch ? boldMatch[1] : part,
                bold: !!boldMatch,
                font: 'Malgun Gothic',
                size: 22,
              });
            });
            elements.push(new Paragraph({ children: runs }));
          }

          if (inTable) flushTable();
          return elements;
        };

        const sectionChildren = [];

        sectionChildren.push(
          new Paragraph({
            heading: HeadingLevel.HEADING_1,
            alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: `${file.name.replace('.pdf', '')}`, font: 'Malgun Gothic', bold: true, size: 36 })]
          }),
          new Paragraph({
            alignment: AlignmentType.CENTER,
            spacing: { after: 400 },
            children: [new TextRun({ text: '번역 결과', font: 'Malgun Gothic', size: 28, color: '3B82F6' })]
          }),
          new Paragraph({
            alignment: AlignmentType.CENTER,
            spacing: { after: 200 },
            children: [new TextRun({ text: `전문 분야: ${domain}  |  AI 모델: ${selectedModel}  |  번역일: ${new Date().toLocaleDateString('ko-KR')}`, font: 'Malgun Gothic', size: 18, color: '64748B' })]
          }),
          new Paragraph({ children: [new PageBreak()] })
        );

        for (let i = 0; i < results.length; i++) {
          const r = results[i];
          sectionChildren.push(
            new Paragraph({
              heading: HeadingLevel.HEADING_2,
              children: [new TextRun({ text: `페이지 ${r.page}`, font: 'Malgun Gothic' })]
            })
          );
          const children = await textToDocxChildren(r.translated || '');
          sectionChildren.push(...children);
          if (i < results.length - 1) {
            sectionChildren.push(new Paragraph({ children: [new PageBreak()] }));
          }
        }

        const doc = new Document({
          numbering: {
            config: [
              {
                reference: 'bullets',
                levels: [{ level: 0, format: LevelFormat.BULLET, text: '•', alignment: AlignmentType.LEFT,
                  style: { paragraph: { indent: { left: 720, hanging: 360 } } } }]
              },
              {
                reference: 'numbers',
                levels: [{ level: 0, format: LevelFormat.DECIMAL, text: '%1.', alignment: AlignmentType.LEFT,
                  style: { paragraph: { indent: { left: 720, hanging: 360 } } } }]
              }
            ]
          },
          styles: {
            default: {
              document: { run: { font: 'Malgun Gothic', size: 22 } }
            },
            paragraphStyles: [
              { id: 'Heading1', name: 'Heading 1', basedOn: 'Normal', next: 'Normal', quickFormat: true,
                run: { size: 36, bold: true, font: 'Malgun Gothic', color: '1E293B' },
                paragraph: { spacing: { before: 360, after: 240 }, outlineLevel: 0 } },
              { id: 'Heading2', name: 'Heading 2', basedOn: 'Normal', next: 'Normal', quickFormat: true,
                run: { size: 28, bold: true, font: 'Malgun Gothic', color: '3B82F6' },
                paragraph: { spacing: { before: 280, after: 180 }, outlineLevel: 1 } },
              { id: 'Heading3', name: 'Heading 3', basedOn: 'Normal', next: 'Normal', quickFormat: true,
                run: { size: 24, bold: true, font: 'Malgun Gothic', color: '475569' },
                paragraph: { spacing: { before: 200, after: 120 }, outlineLevel: 2 } },
            ]
          },
          sections: [{
            properties: {
              page: {
                size: { width: 11906, height: 16838 }, // A4
                margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }
              }
            },
            children: sectionChildren
          }]
        });

        const buffer = await Packer.toBlob(doc);
        const url = URL.createObjectURL(buffer);
        const a = document.createElement('a');
        a.href = url;
        a.download = `번역_${file.name.replace('.pdf', '')}.docx`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setShowDownloadMenu(false);
      };

      const triggerDownload = (content, filename, mimeType) => {
        const blob = new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setShowDownloadMenu(false);
      };

      const formatTranslatedText = (text, status) => {
        if (!text) return <span className="italic text-slate-400">번역 결과가 없습니다.</span>;

        if (status === 'error') {
          return <div className="whitespace-pre-wrap text-red-500 text-sm font-mono bg-red-50 p-4 rounded-xl">{text}</div>;
        }

        const parts = text.split(/(!\[.*?\]\(data:image\/[^)]+\))/g);
        return (
          <div className="translation-content font-sans leading-relaxed text-[15px] text-slate-800 space-y-1">
            {parts.map((part, idx) => {
              const imgMatch = part.match(/!\[(.*?)\]\((data:image\/[^)]+)\)/);
              if (imgMatch) {
                return (
                  <div key={idx} className="my-6 border border-slate-200 rounded-2xl overflow-hidden bg-slate-50 p-3 shadow-sm flex flex-col items-center">
                    <img src={imgMatch[2]} alt={imgMatch[1]} className="max-w-full h-auto rounded-xl" />
                    {imgMatch[1] && <p className="text-center text-[11px] text-slate-500 mt-2 font-medium">{imgMatch[1]}</p>}
                  </div>
                );
              }
              if (!part.trim()) return null;
              const html = window.marked ? window.marked.parse(part) : part;
              return <div key={idx} className="prose prose-sm prose-slate max-w-none" dangerouslySetInnerHTML={{ __html: html }} />;
            })}
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col p-4 md:p-8">
          <div className="max-w-6xl w-full mx-auto space-y-6 flex-grow">

            {/* Header */}
            <div className="text-center space-y-3 mb-10">

                <div className="p-3.5 bg-blue-600 rounded-[2rem] shadow-xl shadow-blue-200 rotate-3">

                </div>
                <h1 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter">PDF AI 번역기</h1>
              </div>
              <p className="text-slate-500 max-w-xl mx-auto font-medium">
                표와 그림을 유지하며 전문 분야에 특화된 AI 번역 서비스를 경험하세요.

            {error && (

                        >

                          {result.status === 'translating' && <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase flex items-center"><Loader2 className="w-3 h-3 mr-1.5 animate-spin" />Translating</span>}
                          {result.status === 'done' && <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-black uppercase flex items-center"><CheckCircle className="w-3 h-3 mr-1.5" />Finished</span>}
                          {result.status === 'error' && <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-[10px] font-black uppercase flex items-center"><AlertCircle className="w-3 h-3 mr-1.5" />Failed</span>}
                        </div>
                      </div>

                      <div className="grid grid-cols-1 lg:grid-cols-2 divide-y lg:divide-y-0 lg:divide-x divide-slate-100">
                        {/* 원본 */}
                        <div className="p-6 md:p-8 bg-slate-50/30">
                          <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Source (Original Page)</h4>
                          <div className="rounded-[2rem] overflow-hidden border-4 border-white bg-white shadow-2xl shadow-slate-300/50">
                            {result.originalImage ? (
                              <img src={result.originalImage} alt={`Page ${result.page}`} className="w-full h-auto" />
                            ) : (
                              <div className="h-80 flex flex-col items-center justify-center text-slate-300 italic text-sm space-y-4">
                                <Loader2 className="w-10 h-10 animate-spin opacity-20" />
                                <span>이미지 로딩 중...</span>
                              </div>
                            )}
                          </div>
                        </div>

                        {/* 번역 결과 */}
                        <div className="p-6 md:p-8 bg-white relative">
                          <h4 className="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-6">Translation (Korean)</h4>
                          <div className="min-h-[150px]">
                            {result.status === 'done' || result.status === 'error' ? (
                              formatTranslatedText(result.translated, result.status)
                            ) : (
                              <div className="space-y-4 pt-4">
                                {[12, 11, 10, 11, 8].map((w, i) => (
                                  <div key={i} className={`h-3.5 bg-slate-100 rounded-full w-${w}/12 animate-pulse`} />
                                ))}
                              </div>
                            )}
                          </div>
                          <div className="hidden lg:flex absolute top-1/2 -left-3.5 -mt-3.5 w-7 h-7 bg-white border-2 border-slate-100 rounded-full items-center justify-center z-10 shadow-lg text-slate-300">
                            <ChevronRight className="w-4 h-4" />
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}

                  {!isProcessing && results.length > 0 && (
                    <div className="flex justify-center mt-12 mb-10">
                      <button onClick={handleReset}
                        className="group flex items-center px-10 py-4 bg-white border-2 border-slate-200 text-slate-600 hover:text-slate-900 hover:border-slate-400 font-bold rounded-3xl transition-all shadow-sm active:scale-95">
                        <RefreshCw className="w-5 h-5 mr-3 text-slate-400 group-hover:rotate-180 transition-transform duration-700" />
                        초기 화면으로 돌아가기
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
          
          {/* 푸터 영역 추가 */}
          <footer className="mt-auto pt-12 pb-4 text-center text-slate-400 text-[13px] font-medium leading-relaxed">
            <p>만든이: 곽현석(waurimal@snuecse.org)</p>
            <p>Copyright © WaurimaL. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

    /* 마크다운 표 스타일 */
    .prose table { border-collapse: collapse; width: 100%; margin: 1.5rem 0; border-radius: 0.75rem; overflow: hidden; font-size: 0.85rem; }
    .prose th { background-color: #f1f5f9; padding: 0.75rem 1rem; font-weight: 700; border: 1px solid #e2e8f0; text-align: left; }
    .prose td { padding: 0.75rem 1rem; border: 1px solid #e2e8f0; }
    .prose tr:nth-child(even) td { background-color: #f8fafc; }

    /* translation-content 내 prose 적용 */
    .translation-content .prose table { font-size: 0.82rem; }
    .translation-content .prose h1,
    .translation-content .prose h2,
    .translation-content .prose h3 { font-weight: 700; margin: 1rem 0 0.5rem; }
    .translation-content .prose ul { list-style: disc; padding-left: 1.5rem; }
    .translation-content .prose ol { list-style: decimal; padding-left: 1.5rem; }
    .translation-content .prose p { margin: 0.5rem 0; }
    .translation-content .prose strong { font-weight: 700; }
  </style>
</body>
</html>
